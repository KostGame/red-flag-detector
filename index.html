<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#121216">
  <title>Ред Флаг</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111115;
      --bg-soft: #17171d;
      --panel: #202028;
      --panel-strong: #282832;
      --text: #f7f2ee;
      --muted: #b8b0a8;
      --line: rgba(255, 255, 255, 0.1);
      --red: #ff4d57;
      --green: #3ed07f;
      --yellow: #ffd25f;
      --burgundy: #9f1d43;
      --orange: #ff944d;
      --blue: #6bb8ff;
      --accent: var(--red);
      --accent-soft: rgba(255, 77, 87, 0.15);
      --shadow: 0 22px 48px rgba(0, 0, 0, 0.34);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      margin: 0;
      background:
        linear-gradient(145deg, rgba(255, 77, 87, 0.12), transparent 36%),
        linear-gradient(235deg, rgba(62, 208, 127, 0.1), transparent 42%),
        #111115;
      color: var(--text);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(100%, 540px);
      min-height: 100svh;
      margin: 0 auto;
      padding: 18px 14px 28px;
    }

    .hero {
      padding: 20px 2px 18px;
    }

    .hero-topline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      margin-bottom: 10px;
      color: #ffd9dc;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .signal-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--red);
      box-shadow: 0 0 0 7px rgba(255, 77, 87, 0.13);
      animation: pulseSignal 2.2s ease-in-out infinite;
    }

    h1 {
      margin: 0;
      color: var(--text);
      font-size: 46px;
      line-height: 0.95;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 26rem;
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.45;
    }

    .panel,
    .result-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(32, 32, 40, 0.9);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .panel {
      padding: 14px;
    }

    .section-label {
      display: block;
      margin: 0 0 9px;
      color: #dfd8d1;
      font-size: 13px;
      font-weight: 850;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .mode-button,
    .ghost-button,
    .primary-button,
    .copy-button {
      min-height: 48px;
      border: 0;
      border-radius: var(--radius);
      cursor: pointer;
      transition:
        transform 150ms ease,
        border-color 150ms ease,
        background 150ms ease,
        color 150ms ease,
        opacity 150ms ease;
    }

    .mode-button {
      padding: 10px 10px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      background: #17171d;
      color: #ded7cf;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.2;
      text-align: left;
    }

    .mode-button[aria-pressed="true"] {
      border-color: rgba(255, 77, 87, 0.62);
      background: linear-gradient(180deg, rgba(255, 77, 87, 0.22), rgba(255, 77, 87, 0.1));
      color: #fff7f8;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    .mode-button:active,
    .primary-button:active,
    .copy-button:active,
    .ghost-button:active {
      transform: scale(0.98);
    }

    .field-row {
      display: grid;
      gap: 12px;
    }

    .context-select,
    .input-area {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius);
      background: #15151b;
      color: var(--text);
      outline: 0;
      transition: border-color 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    .context-select {
      min-height: 50px;
      padding: 0 12px;
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, #d7d0c8 50%),
        linear-gradient(135deg, #d7d0c8 50%, transparent 50%);
      background-position:
        calc(100% - 20px) 22px,
        calc(100% - 14px) 22px;
      background-size: 6px 6px;
      background-repeat: no-repeat;
    }

    .input-area {
      min-height: 132px;
      padding: 13px 12px;
      resize: vertical;
      line-height: 1.45;
    }

    .context-select:focus,
    .input-area:focus {
      border-color: rgba(255, 77, 87, 0.62);
      background: #181820;
      box-shadow: 0 0 0 4px rgba(255, 77, 87, 0.12);
    }

    .input-area.is-listening {
      border-color: rgba(255, 77, 87, 0.78);
      box-shadow: 0 0 0 4px rgba(255, 77, 87, 0.16);
    }

    .voice-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }

    .voice-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 46px;
      padding: 0 12px;
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: var(--radius);
      background: #15151b;
      color: #eee7df;
      cursor: pointer;
      font-weight: 850;
      transition:
        transform 150ms ease,
        border-color 150ms ease,
        background 150ms ease,
        box-shadow 150ms ease;
    }

    .voice-button:active {
      transform: scale(0.98);
    }

    .voice-button.is-listening {
      border-color: rgba(255, 77, 87, 0.72);
      background: linear-gradient(180deg, rgba(255, 77, 87, 0.26), rgba(255, 77, 87, 0.12));
      box-shadow: 0 12px 22px rgba(255, 77, 87, 0.18);
    }

    .voice-icon {
      display: inline-block;
      font-size: 19px;
      transform-origin: 50% 100%;
    }

    .voice-button.is-listening .voice-icon {
      animation: micBob 720ms ease-in-out infinite;
    }

    .voice-meter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 70px;
      min-height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius);
      background: rgba(0, 0, 0, 0.18);
      opacity: 0.44;
      transition: opacity 150ms ease, border-color 150ms ease;
    }

    .voice-meter span {
      width: 5px;
      height: 11px;
      border-radius: 999px;
      background: var(--red);
      transform-origin: 50% 100%;
    }

    .voice-meter.is-active {
      border-color: rgba(255, 77, 87, 0.5);
      opacity: 1;
    }

    .voice-meter.is-active span {
      animation: voiceBar 680ms ease-in-out infinite;
    }

    .voice-meter.is-active span:nth-child(2) {
      animation-delay: 110ms;
    }

    .voice-meter.is-active span:nth-child(3) {
      animation-delay: 220ms;
    }

    .voice-meter.is-active span:nth-child(4) {
      animation-delay: 330ms;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 0.62fr;
      gap: 8px;
      margin-top: 14px;
    }

    .primary-button,
    .copy-button {
      background: linear-gradient(180deg, #ff626b, #dc2638);
      color: #fff;
      font-weight: 900;
      box-shadow: 0 14px 26px rgba(220, 38, 56, 0.28);
    }

    .ghost-button {
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #15151b;
      color: #e7dfd7;
      font-weight: 850;
    }

    .result-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .copy-button {
      background: linear-gradient(180deg, rgba(62, 208, 127, 0.95), #1f9d59);
      box-shadow: 0 14px 26px rgba(31, 157, 89, 0.18);
    }

    .copy-button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      transform: none;
    }

    .status {
      min-height: 22px;
      margin: 10px 2px 0;
      color: #bdeccf;
      font-size: 13px;
      font-weight: 750;
    }

    .result-wrap {
      margin-top: 14px;
    }

    .result-card {
      display: none;
      overflow: hidden;
      position: relative;
      padding: 18px;
      background:
        linear-gradient(160deg, var(--accent-soft), rgba(32, 32, 40, 0.82) 48%),
        #202028;
    }

    .result-card.is-visible {
      display: block;
      animation: cardIn 280ms ease both;
    }

    .result-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 6px;
      background: var(--accent);
    }

    .result-head {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .flag-emoji {
      display: grid;
      width: 56px;
      height: 56px;
      place-items: center;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.08);
      font-size: 34px;
      animation: flagWave 1.4s ease-in-out infinite;
    }

    .result-title {
      margin: 0;
      color: #fff;
      font-size: 25px;
      line-height: 1.08;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .score-pill {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: var(--radius);
      background: rgba(0, 0, 0, 0.24);
      color: #fff8ed;
      font-size: 14px;
      font-weight: 900;
    }

    .meter {
      overflow: hidden;
      height: 9px;
      margin: 12px 0 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
    }

    .meter-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), #fff1b8);
      transition: width 420ms ease 80ms;
    }

    .result-card.is-visible .meter-fill {
      width: var(--score-width);
    }

    .result-block {
      margin: 0 0 13px;
      color: #efe8df;
      font-size: 15px;
      line-height: 1.48;
      overflow-wrap: anywhere;
    }

    .result-block strong {
      display: block;
      margin-bottom: 4px;
      color: #ffffff;
      font-size: 13px;
      text-transform: uppercase;
    }

    .small-print {
      margin: 18px 3px 0;
      color: #a8a099;
      font-size: 12px;
      line-height: 1.45;
      text-align: center;
    }

    .is-hidden {
      display: none;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes flagWave {
      0%,
      100% {
        transform: rotate(-3deg) translateY(0);
      }
      50% {
        transform: rotate(4deg) translateY(-2px);
      }
    }

    @keyframes pulseSignal {
      0%,
      100% {
        transform: scale(1);
        opacity: 0.86;
      }
      50% {
        transform: scale(1.18);
        opacity: 1;
      }
    }

    @keyframes micBob {
      0%,
      100% {
        transform: translateY(0) rotate(-3deg);
      }
      50% {
        transform: translateY(-2px) rotate(4deg);
      }
    }

    @keyframes voiceBar {
      0%,
      100% {
        transform: scaleY(0.58);
        opacity: 0.62;
      }
      50% {
        transform: scaleY(1.72);
        opacity: 1;
      }
    }

    @media (min-width: 520px) {
      .app {
        padding-top: 28px;
      }

      h1 {
        font-size: 56px;
      }

      .mode-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="hero-topline"><span class="signal-dot" aria-hidden="true"></span>детектор бытовой драматургии</div>
      <h1>Ред Флаг</h1>
      <p class="subtitle">Проверка людей, поступков и подозрительных переписок</p>
    </header>

    <section class="panel" aria-label="Проверка">
      <span class="section-label">Режим</span>
      <div class="mode-grid" id="modeGrid">
        <button class="mode-button" type="button" data-mode="action" aria-pressed="true">Проверить поступок</button>
        <button class="mode-button" type="button" data-mode="phrase" aria-pressed="false">Проверить фразу</button>
        <button class="mode-button" type="button" data-mode="green" aria-pressed="false">Грин флаг детектор</button>
        <button class="mode-button" type="button" data-mode="daily" aria-pressed="false">Флаг дня</button>
        <button class="mode-button" type="button" data-mode="friend" aria-pressed="false">Подруга сказала</button>
      </div>

      <div class="field-row">
        <div>
          <label class="section-label" for="contextSelect">Контекст</label>
          <select class="context-select" id="contextSelect">
            <option value="relationships">Отношения</option>
            <option value="friendship">Дружба</option>
            <option value="work">Работа</option>
            <option value="family">Семья</option>
            <option value="money">Деньги</option>
            <option value="chat">Переписка</option>
            <option value="unknown">Не знаю, просто странно</option>
          </select>
        </div>

        <div id="inputWrap">
          <label class="section-label" for="textInput" id="inputLabel">Опиши поступок</label>
          <textarea class="input-area" id="textInput" maxlength="420" placeholder="Например: он сказал, что бывшая просто подруга, но они ездят вместе на дачу"></textarea>
          <div class="voice-row is-hidden" id="voiceRow">
            <button class="voice-button" type="button" id="voiceButton" aria-pressed="false" aria-label="Начать голосовой ввод">
              <span class="voice-icon" aria-hidden="true">🎙️</span>
              <span id="voiceButtonText">Сказать голосом</span>
            </button>
            <div class="voice-meter" id="voiceMeter" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="primary-button" type="button" id="checkButton">Проверить</button>
        <button class="ghost-button" type="button" id="clearButton">Очистить</button>
      </div>
      <div class="status" id="statusText" aria-live="polite"></div>
    </section>

    <section class="result-wrap" aria-live="polite">
      <article class="result-card" id="resultCard">
        <div class="result-head">
          <div class="flag-emoji" id="flagEmoji" aria-hidden="true">🚩</div>
          <div>
            <h2 class="result-title" id="flagTitle">Ред флаг</h2>
            <div class="score-pill" id="scorePill">Тревожность: 82%</div>
          </div>
        </div>
        <div class="meter" aria-hidden="true"><div class="meter-fill" id="meterFill"></div></div>
        <p class="result-block" id="verdictBlock"><strong>Вердикт</strong><span></span></p>
        <p class="result-block" id="explanationBlock"><strong>Объяснение</strong><span></span></p>
        <p class="result-block" id="adviceBlock"><strong>Совет</strong><span></span></p>
      </article>

      <div class="result-actions">
        <button class="copy-button" type="button" id="againButton">Проверить ещё</button>
        <button class="ghost-button" type="button" id="copyButton" disabled>Скопировать результат</button>
      </div>
    </section>

    <p class="small-print">Это шуточный детектор, а не психолог, суд и не твоя мама. Смотри на контекст и повторяющееся поведение.</p>
  </main>

        if (!recognition || !isListening) return;
        voiceEndMessage = message || "Голосовой ввод остановлен.";

      function setupVoiceInput() {
        const SpeechRecognitionConstructor = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognitionConstructor) {
          elements.voiceRow.classList.add("is-hidden");
          return;
        }

        elements.voiceRow.classList.remove("is-hidden");
        recognition = new SpeechRecognitionConstructor();
        recognition.lang = "ru-RU";
        recognition.interimResults = true;
        recognition.continuous = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
          setVoiceState(true, "Слушаю. Говори ситуацию, а детектор делает вид, что он серьезный прибор.");
        };

        recognition.onresult = (event) => {
          let finalTranscript = "";
          let interimTranscript = "";

          for (let index = event.resultIndex; index < event.results.length; index += 1) {
            const transcript = event.results[index][0].transcript;
            if (event.results[index].isFinal) {
              finalTranscript += transcript;
            } else {
              interimTranscript += transcript;
            }
          }

          if (finalTranscript) {
            appendVoiceText(finalTranscript);
          }

          if (interimTranscript.trim()) {
            elements.statusText.textContent = `Слышу: ${interimTranscript.trim()}`;

          voiceEndMessage = "";

      function normalize(value) {
        return value.toLocaleLowerCase("ru-RU").replace(/\s+/g, " ").trim();
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function hashString(value) {
        let hash = 2166136261;
        for (let i = 0; i < value.length; i += 1) {
          hash ^= value.charCodeAt(i);
          hash = Math.imul(hash, 16777619);
        }
        return hash >>> 0;
      }

      function createRandom(seedText) {
        let seed = hashString(`${seedText}|${rollCounter}|${Date.now()}`);
        return () => {
          seed += 0x6d2b79f5;
          let value = seed;
          value = Math.imul(value ^ (value >>> 15), value | 1);
          value ^= value + Math.imul(value ^ (value >>> 7), value | 61);
          return ((value ^ (value >>> 14)) >>> 0) / 4294967296;
        };
      }

      function pick(list, random) {
        return list[Math.floor(random() * list.length)];
      }

      function countHits(text, keywords) {
        return keywords.filter((keyword) => text.includes(keyword));
      }

      function analyze(text, mode, contextKey, random) {
        const clean = normalize(text);
        const context = contextData[contextKey];
        const redHits = countHits(clean, redKeywords);
        const greenHits = countHits(clean, greenKeywords);
        const overheats = countHits(clean, overheatKeywords);
        const hasQuestion = clean.includes("?") || clean.includes("почему") || clean.includes("как так");
        const neutralBase = redHits.length === 0 && greenHits.length === 0 ? Math.floor(28 + random() * 42) : 38;
        const noise = Math.floor(random() * 17) - 8;
        const danger = clamp(
          neutralBase + redHits.length * 17 - greenHits.length * 11 + overheats.length * 5 + context.redBonus + noise,
          4,
          98
        );
        const adequacy = clamp(
          48 + greenHits.length * 17 - redHits.length * 10 + context.greenBonus + (hasQuestion ? 4 : 0) + noise,
          3,
          98
        );

        return { clean, redHits, greenHits, overheats, danger, adequacy };
      }

      function decideActionFlag(analysis, random) {
        if (analysis.greenHits.length >= 2 && analysis.redHits.length === 0) return "green";
        if (analysis.redHits.length >= 4 && analysis.danger >= 78) return random() > 0.5 ? "run" : "burgundy";
        if (analysis.danger >= 89) return "run";
        if (analysis.danger >= 76) return "burgundy";
        if (analysis.danger >= 62) return random() > 0.76 ? "circus" : "red";
        if (analysis.danger >= 41) return random() > 0.82 ? "circus" : "yellow";
        return "green";
      }

        const random = createRandom(`${currentMode}|${contextKey}|${text}`);
        const analysis = analyze(text, currentMode, contextKey, random);
        const key = decideActionFlag(analysis, random);
        const meta = flagMeta[key];
        const context = contextData[contextKey];
        const scoreLabel = key === "green" ? "Адекватность" : key === "yellow" ? "Мутность" : "Тревожность";
        const score = key === "green" ? clamp(100 - analysis.danger + analysis.greenHits.length * 5, 38, 97) : analysis.danger;

        return {
          meta,
          score,
          scoreText: `${scoreLabel}: ${score}%`,
          verdict: pick(verdicts[key], random),
          explanation: `${pick(explanations[key], random)} ${context.nudge}`,
          advice: `${pick(generalAdvice[key], random)} ${context.advice}`
        };
      }

      function buildPhraseResult(text, contextKey) {
        const random = createRandom(`${currentMode}|${contextKey}|${text}`);
        const analysis = analyze(text, currentMode, contextKey, random);
        const context = contextData[contextKey];
        let tone = "yellow";
        if (analysis.greenHits.length > analysis.redHits.length && analysis.adequacy > 58) tone = "green";
        if (analysis.redHits.length > 0 && analysis.danger > 58) tone = "red";
        const meta = {
          ...flagMeta[tone],
          name: pick(phraseFlags[tone], random)
        };
        const score = tone === "green" ? analysis.adequacy : analysis.danger;

        return {
          meta,
          score,
          scoreText: tone === "green" ? `Адекватность фразы: ${score}%` : `Риск подвоха: ${score}%`,
          verdict: tone === "green" ? pick(verdicts.green, random) : tone === "red" ? pick(verdicts.red, random) : pick(verdicts.yellow, random),
          explanationLabel: "Перевод с человеческого",
          explanation: `${pick(translations[tone], random)} ${context.nudge}`,
          advice: `${tone === "red" ? pick(generalAdvice.red, random) : pick(generalAdvice.yellow, random)} ${context.advice}`
        };
      }

        const random = createRandom(`${currentMode}|${contextKey}|${text}`);
        const analysis = analyze(text, currentMode, contextKey, random);
        const context = contextData[contextKey];
        const score = clamp(analysis.adequacy + 22 - analysis.redHits.length * 8, 18, 99);
        const meta = score > 74 ? flagMeta.green : score > 48 ? flagMeta.yellow : flagMeta.circus;
        const weakNote = score > 74
          ? "Похоже на грин флаг: есть ясность, уважение или готовность к диалогу."
          : "Хорошее намерение возможно, но приложение видит неоднозначность. Не спеши ставить памятник.";

        return {
          meta: { ...meta, name: score > 74 ? "Грин флаг" : meta.name },
          score,
          scoreText: `Уровень адекватности: ${score}%`,
          verdict: score > 74 ? pick(verdicts.green, random) : pick(verdicts.yellow, random),
          explanation: `${weakNote} ${context.nudge}`,
          advice: `Цени такое, но не идеализируй. ${context.advice}`
        };
      }

      function buildDailyResult(contextKey) {
        const random = createRandom(`${currentMode}|${contextKey}|daily`);
        const context = contextData[contextKey];
        const score = Math.floor(58 + random() * 39);
        const text = pick(dailyFlags, random);

        return {
          meta: flagMeta.daily,
          score,
          scoreText: `Драматичность дня: ${score}%`,
          verdict: `Сегодня твой флаг: ${text}`,
          explanation: context.nudge,
          advice: context.advice
        };
      }

      function buildFriendResult(text, contextKey) {
        const random = createRandom(`${currentMode}|${contextKey}|${text}`);
        const analysis = analyze(text, currentMode, contextKey, random);
        const context = contextData[contextKey];
        const score = clamp(50 + analysis.redHits.length * 11 - analysis.overheats.length * 7 + Math.floor(random() * 23) - 8, 22, 94);

        return {
          meta: flagMeta.friend,
          score,
          scoreText: `Вероятность попадания: ${score}%`,
          verdict: pick(friendVerdicts, random).replace("{score}", score),
          explanationLabel: "Где может быть перегиб",
          explanation: `${pick(friendOverheat, random)} ${context.nudge}`,
          adviceLabel: "Что проверить самому",
          advice: `${pick(friendCheck, random)} ${context.advice}`
        };
      }

      function buildEmptyResult(contextKey) {
        const random = createRandom(`empty|${currentMode}|${contextKey}`);
        const meta = flagMeta.yellow;
        const score = Math.floor(33 + random() * 28);
        return {
          meta,
          score,
          scoreText: `Мутность пустого поля: ${score}%`,
          verdict: "Детектор посмотрел в пустоту и вежливо попросил хоть немного драмы.",
          explanation: "Без текста можно проверить только тишину. Тишина, кстати, пока нейтральная.",
          advice: "Напиши ситуацию одной-двумя фразами. Чем конкретнее ввод, тем смешнее и точнее вердикт."
        };
      }

      function makeResult() {
        rollCounter += 1;
        const contextKey = elements.contextSelect.value;
        const text = elements.textInput.value.trim();

        if (currentMode === "daily") return buildDailyResult(contextKey);
        if (!text) return buildEmptyResult(contextKey);
        if (currentMode === "phrase") return buildPhraseResult(text, contextKey);
        if (currentMode === "green") return buildGreenResult(text, contextKey);
        if (currentMode === "friend") return buildFriendResult(text, contextKey);
        return buildActionResult(text, contextKey);
      }

      function setBlock(block, label, text) {
        const strong = block.querySelector("strong");
        const span = block.querySelector("span");
        strong.textContent = label;
        span.textContent = text;
      }

      function renderResult(result) {
        const { meta } = result;
        elements.resultCard.classList.remove("is-visible");
        elements.resultCard.style.setProperty("--accent", meta.color);
        elements.resultCard.style.setProperty("--accent-soft", meta.soft);
        elements.resultCard.style.setProperty("--score-width", `${result.score}%`);
        elements.flagEmoji.textContent = meta.emoji;
        elements.flagTitle.textContent = meta.name;
        elements.scorePill.textContent = result.scoreText;
        elements.meterFill.style.width = "0%";
        setBlock(elements.verdictBlock, "Вердикт", result.verdict);
        setBlock(elements.explanationBlock, result.explanationLabel || "Объяснение", result.explanation);
        setBlock(elements.adviceBlock, result.adviceLabel || "Совет", result.advice);

        requestAnimationFrame(() => {
          elements.resultCard.classList.add("is-visible");
          elements.meterFill.style.width = `${result.score}%`;
        });

        lastResultText = [
          `Ред Флаг`,
          `${meta.emoji} ${meta.name}`,
          result.scoreText,
          `Вердикт: ${result.verdict}`,
          `${result.explanationLabel || "Объяснение"}: ${result.explanation}`,
          `${result.adviceLabel || "Совет"}: ${result.advice}`
        ].join("\n");
        elements.copyButton.disabled = false;
        elements.statusText.textContent = "";
      }

      function switchMode(mode) {
        if (!modes[mode]) return;
        if (isListening) {
          stopVoiceInput("Голосовой ввод остановлен при смене режима.");
        }
        currentMode = mode;
        localStorage.setItem("redFlagMode", mode);
        elements.modeButtons.forEach((button) => {
          button.setAttribute("aria-pressed", String(button.dataset.mode === mode));
        });

        const config = modes[mode];
        elements.inputLabel.textContent = config.label;
        elements.textInput.placeholder = config.placeholder;
        elements.checkButton.textContent = config.button;
        elements.inputWrap.classList.toggle("is-hidden", mode === "daily");
        elements.statusText.textContent = "";
      }

      async function copyResult() {
        if (!lastResultText) return;
        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(lastResultText);
          } else {
            const temporary = document.createElement("textarea");
            temporary.value = lastResultText;
            temporary.setAttribute("readonly", "");
            temporary.style.position = "fixed";
            temporary.style.opacity = "0";
            document.body.appendChild(temporary);
            temporary.select();
            document.execCommand("copy");
            temporary.remove();
          }
          elements.statusText.textContent = "Результат скопирован. Можно нести в чат, но без приговора.";
        } catch (error) {
          elements.statusText.textContent = "Не получилось скопировать автоматически. Выдели текст карточки вручную.";
        }
      }

      function clearAll() {
        if (isListening) {
          stopVoiceInput("Голосовой ввод остановлен, поле очищено.");
        }
        elements.textInput.value = "";
        elements.resultCard.classList.remove("is-visible");
        elements.copyButton.disabled = true;
        lastResultText = "";
        elements.statusText.textContent = "Очищено. Драма отправлена на проветривание.";
        if (currentMode !== "daily") {
          elements.textInput.focus();
        }
      }

      elements.modeGrid.addEventListener("click", (event) => {
        const button = event.target.closest(".mode-button");
        if (!button) return;
        switchMode(button.dataset.mode);
      });

      elements.contextSelect.addEventListener("change", () => {
        localStorage.setItem("redFlagContext", elements.contextSelect.value);
      });

      elements.checkButton.addEventListener("click", () => {
        renderResult(makeResult());
      });

      elements.againButton.addEventListener("click", () => {
        renderResult(makeResult());
      });

      elements.clearButton.addEventListener("click", clearAll);
      elements.copyButton.addEventListener("click", copyResult);
      elements.voiceButton.addEventListener("click", toggleVoiceInput);

      elements.textInput.addEventListener("keydown", (event) => {
        if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
          renderResult(makeResult());
        }
      });

      setupVoiceInput();
      switchMode(currentMode);
    })();
  </script>
</body>
</html>
